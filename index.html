<!DOCTYPE html>
<html>
<head>
    <title>Pulang Kerja</title>
</head>
<body style="background-color: #121212; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center; margin: 0;">

    <div id="status">Memeriksa Waktu...</div>

    <script>
        function jalankanRedirect() {
            // --- BAGIAN YANG BISA ANDA EDIT ---
            const jamBuka = 10;   
            const menitBuka = 00; 
            const jamTutup = 8;   
            const menitTutup = 0; 
            // ----------------------------------

            const sekarang = new Date();
            // Memastikan menggunakan zona waktu Jakarta (WIB)
            const waktuWIB = new Date(sekarang.toLocaleString("en-US", {timeZone: "Asia/Jakarta"}));
            
            const jamAktual = waktuWIB.getHours();
            const menitAktual = waktuWIB.getMinutes();
            
            const waktuSekarang = (jamAktual * 60) + menitAktual;
            const jadwalBuka = (jamBuka * 60) + menitBuka;
            const jadwalTutup = (jamTutup * 60) + menitTutup;

            const formatWaktu = (h, m) => h.toString().padStart(2, '0') + ":" + m.toString().padStart(2, '0');
            const teksJamBuka = formatWaktu(jamBuka, menitBuka);
            const teksJamTutup = formatWaktu(jamTutup, menitTutup);
            const teksWaktuSekarang = formatWaktu(jamAktual, menitAktual);

            const statusDiv = document.getElementById('status');

            if (waktuSekarang >= jadwalTutup && waktuSekarang < jadwalBuka) {
                // TAMPILAN JIKA AKSES DITUTUP
                statusDiv.innerHTML = `
                    <h2 style="color: #ff4d4d;">AKSES DITUTUP</h2>
                    <p>Waktu saat ini: <b>${teksWaktuSekarang}</b></p>
                    <p>Jadwal tutup: <b>${teksJamTutup} s/d ${teksJamBuka} WIB</b></p>
                    <p>Silakan scan kembali pukul <b>${teksJamBuka} WIB</b>.</p>
                `;
            } else {
                // TAMPILAN JIKA AKSES DIBUKA DENGAN COUNTDOWN
                let hitungan = 3;
                
                const interval = setInterval(function() {
                    statusDiv.innerHTML = `
                        <h2 style="color: #4CAF50;">WAKTU SESUAI</h2>
                        <p>Membuka Mobile Legends dalam...</p>
                        <h1 style="font-size: 80px; margin: 10px 0;">${hitungan}</h1>
                    `;
                    
                    if (hitungan <= 0) {
                        clearInterval(interval);
                        statusDiv.innerHTML = "<h2>Membuka Aplikasi...</h2>";
                        // Cara yang lebih kompatibel untuk iOS
                        window.location.assign("roblox://app");
    
                        // Backup jika .assign gagal dalam 500ms
                        setTimeout(function() {
                        window.location.href = "roblox://app";
                        }, 500);
                    }
                    
                    hitungan--;
                }, 1000); // Berjalan setiap 1 detik (1000ms)
            }
        }

        window.onload = jalankanRedirect;
    </script>
</body>
</html>
