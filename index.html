<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Pulang Kerja</title>
    
    <style>
        body {
            background-color: #121212;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }
        .container {
            padding: 20px;
            width: 90%;
        }
        h2 { font-size: 1.8rem; margin-bottom: 15px; }
        p { font-size: 1.1rem; line-height: 1.6; color: #ccc; }
        b { color: #fff; }
        h1 { font-size: 5rem; color: #4CAF50; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="status" class="container">Memeriksa Waktu...</div>

    <script>
        function jalankanRedirect() {
            // --- BAGIAN EDIT JADWAL ---
            const jamBuka = 19;   
            const menitBuka = 15; 
            const jamTutup = 8;   
            const menitTutup = 0; 
            // --------------------------

            const sekarang = new Date();
            const waktuWIB = new Date(sekarang.toLocaleString("en-US", {timeZone: "Asia/Jakarta"}));
            
            const jamAktual = waktuWIB.getHours();
            const menitAktual = waktuWIB.getMinutes();
            
            const waktuSekarang = (jamAktual * 60) + menitAktual;
            const jadwalBuka = (jamBuka * 60) + menitBuka;
            const jadwalTutup = (jamTutup * 60) + menitTutup;

            const formatWaktu = (h, m) => h.toString().padStart(2, '0') + ":" + m.toString().padStart(2, '0');
            const teksJamBuka = formatWaktu(jamBuka, menitBuka);
            const teksJamTutup = formatWaktu(jamTutup, menitTutup);
            const teksWaktuSekarang = formatWaktu(jamAktual, menitAktual);

            const statusDiv = document.getElementById('status');

            if (waktuSekarang >= jadwalTutup && waktuSekarang < jadwalBuka) {
                statusDiv.innerHTML = `
                    <h2 style="color: #ff4d4d;">AKSES DITUTUP</h2>
                    <p>Waktu saat ini: <b>${teksWaktuSekarang}</b></p>
                    <p>Akses Terbuka: <b>${teksJamBuka} s/d ${teksJamTutup} WIB</b></p>
                    <p>Silakan scan kembali pukul <b>${teksJamBuka} WIB</b>.</p>
                `;
            } else {
                let hitungan = 3;
                const interval = setInterval(function() {
                    statusDiv.innerHTML = `
                        <h2 style="color: #4CAF50;">WAKTU SESUAI</h2>
                        <p>Membuka aplikasi dalam...</p>
                        <h1>${hitungan}</h1>
                    `;
                    if (hitungan <= 0) {
                        clearInterval(interval);
                        statusDiv.innerHTML = "<h2>Membuka Aplikasi...</h2>";
                        window.location.assign("mobilelegends://app");
                        setTimeout(() => { window.location.href = "mobilelegends://app"; }, 500);
                    }
                    hitungan--;
                }, 1000);
            }
        }
        window.onload = jalankanRedirect;
    </script>
</body>
</html>
